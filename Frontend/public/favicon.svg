<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <clipPath id="body">
      <rect x="3.5" y="11" width="25" height="17" rx="3"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#g)"/>

  <!-- Handle -->
  <path d="M12 11 Q12 5 16 5 Q20 5 20 11"
        stroke="white" stroke-width="2.5" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Suitcase body -->
  <rect x="3.5" y="11" width="25" height="17" rx="3" fill="white"/>

  <!-- Center divider band, clipped to body so corners stay rounded -->
  <rect x="3.5" y="17.5" width="25" height="3.5"
        fill="url(#g)" clip-path="url(#body)"/>

  <!-- Lock / clasp -->
  <rect x="13" y="16.5" width="6" height="5" rx="1.5" fill="white"/>

  <!-- Wheels -->
  <circle cx="9"  cy="28.5" r="1.8" fill="white" opacity="0.75"/>
  <circle cx="23" cy="28.5" r="1.8" fill="white" opacity="0.75"/>
</svg>
